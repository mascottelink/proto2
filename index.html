<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - Mascotte Link</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-body">

  <div class="login-container">

    <img src="image.png" alt="Mascotte Link Logo" class="logo-small" />
    <h2 class="app-name">Mascotte link</h2>

    <div class="login-card">
      <input type="email" placeholder="correo electronico" />
      <input type="password" placeholder="Contraseña" />

      <button class="btn-primary">Iniciar sesion</button>
    </div>

    <div class="social-login">
      <img src="face.png" alt="facebook" />
      <img src="goo.png" alt="google" />
    </div>

    <a href="registro.html" class="register-link">Registrar</a>
  </div>

</body>
</html>
