<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro de Mascota</title>
  <link rel="stylesheet" href="stylesregis.css" />
</head>
<body class="pet-body">

  <div class="pet-wrapper">
    <div class="pet-container">
<a href="index.html" class="back-btn">←</a>
      <h2 class="title">Registro de Mascota</h2>

      <div class="pet-card">

        <div class="photo-upload">
          <img src="perro.png" alt="Mascota" />
          <button>Subir foto</button>
        </div>

        <input type="text" placeholder="nombre de la mascota" />
        <input type="text" placeholder="tipo de raza" />
        <input type="number" placeholder="Edad" />
        <input type="text" placeholder="Nombre del dueño" />
        <input type="email" placeholder="Correo" />

      </div>

      <button class="btn-primary register-btn">Registrar</button>

    </div>
  </div>

</body>
</html>
